<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choffie Finance - Your Simple Bill Budget</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      margin-top: 15px;
    }

    .item {
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
    }

    .edit {
      padding: 10px;
      background: #fafafa;
    }

    .summary {
      padding: 12px;
      background: #f0f4f8;
      cursor: pointer;
      font-weight: bold;
      display: none;
    }

    .summary span {
      font-weight: normal;
    }

    .results {
      background: #eef7ee;
      padding: 15px;
      border-radius: 6px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<h1>Choffie Finance - Your Simple Bill Budget</h1>

<div class="container">

  <!-- INCOME -->
  <div class="section">
    <h2>Income</h2>

    <label>Take-home pay amount</label>
    <input type="number" id="incomeAmount">

    <label>Pay frequency</label>
    <select id="incomeFrequency">
      <option value="weekly">Weekly</option>
      <option value="fortnightly">Fortnightly</option>
      <option value="monthly">Monthly</option>
    </select>
  </div>

  <!-- BILLS -->
  <div class="section">
    <h2>Recurring Bills</h2>
    <div id="bills"></div>
    <button id="addBillBtn" type="button">Add Bill</button>
  </div>

  <!-- ONE-OFFS -->
  <div class="section">
    <h2>One-off Expenses</h2>
    <div id="oneOffs"></div>
    <button id="addOneOffBtn" type="button">Add One-off Expense</button>
  </div>

  <!-- RESULTS -->
  <div class="section results">
    <h2>Results (per pay)</h2>
    <p><strong>Total to set aside:</strong> $<span id="setAside">0.00</span></p>
    <p><strong>Money left to spend:</strong> $<span id="remaining">0.00</span></p>
  </div>

</div>

<script>
  const billsDiv = document.getElementById("bills");
  const oneOffsDiv = document.getElementById("oneOffs");

  document.getElementById("addBillBtn").addEventListener("click", addBill);
  document.getElementById("addOneOffBtn").addEventListener("click", addOneOff);
  document.addEventListener("input", calculate);

  function addBill() {
    const item = document.createElement("div");
    item.className = "item";

    item.innerHTML = `
      <div class="summary"></div>
      <div class="edit">
        <label>Bill name</label>
        <input type="text">

        <label>Amount</label>
        <input type="number">

        <label>Frequency</label>
        <select>
          <option value="weekly">Weekly</option>
          <option value="fortnightly">Fortnightly</option>
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>

        <button type="button">Done</button>
      </div>
    `;

    const summary = item.querySelector(".summary");
    const edit = item.querySelector(".edit");
    const doneBtn = edit.querySelector("button");

    doneBtn.onclick = () => {
      const name = edit.children[1].value || "Unnamed bill";
      const amount = edit.children[3].value || "0";
      const freq = edit.children[5].value;

      summary.textContent = `${name} — $${amount} / ${freq}`;
      edit.style.display = "none";
      summary.style.display = "block";
      calculate();
    };

    summary.onclick = () => {
      summary.style.display = "none";
      edit.style.display = "block";
    };

    billsDiv.appendChild(item);
  }

  function addOneOff() {
    const item = document.createElement("div");
    item.className = "item";

    item.innerHTML = `
      <div class="summary"></div>
      <div class="edit">
        <label>Expense name</label>
        <input type="text">

        <label>Total amount</label>
        <input type="number">

        <label>Needed by date</label>
        <input type="date">

        <button type="button">Done</button>
      </div>
    `;

    const summary = item.querySelector(".summary");
    const edit = item.querySelector(".edit");
    const doneBtn = edit.querySelector("button");

    doneBtn.onclick = () => {
      const name = edit.children[1].value || "One-off";
      const amount = edit.children[3].value || "0";
      const date = edit.children[5].value || "no date";

      summary.textContent = `${name} — $${amount} by ${date}`;
      edit.style.display = "none";
      summary.style.display = "block";
      calculate();
    };

    summary.onclick = () => {
      summary.style.display = "none";
      edit.style.display = "block";
    };

    oneOffsDiv.appendChild(item);
  }

  function frequencyToWeekly(amount, frequency) {
    switch (frequency) {
      case "weekly": return amount;
      case "fortnightly": return amount / 2;
      case "monthly": return amount * 12 / 52;
      case "quarterly": return amount * 4 / 52;
      case "yearly": return amount / 52;
      default: return 0;
    }
  }

  function weeklyToPayCycle(amountWeekly, payFrequency) {
    switch (payFrequency) {
      case "weekly": return amountWeekly;
      case "fortnightly": return amountWeekly * 2;
      case "monthly": return amountWeekly * 52 / 12;
      default: return 0;
    }
  }

  function weeksUntil(date) {
    const now = new Date();
    const target = new Date(date);
    const diff = (target - now) / (1000 * 60 * 60 * 24 * 7);
    return Math.max(diff, 1);
  }

  function calculate() {
    const income = parseFloat(document.getElementById("incomeAmount").value) || 0;
    const payFrequency = document.getElementById("incomeFrequency").value;

    let totalWeekly = 0;

    document.querySelectorAll("#bills .item").forEach(item => {
      const edit = item.querySelector(".edit");
      const amount = parseFloat(edit.children[3].value) || 0;
      const freq = edit.children[5].value;
      totalWeekly += frequencyToWeekly(amount, freq);
    });

    document.querySelectorAll("#oneOffs .item").forEach(item => {
      const edit = item.querySelector(".edit");
      const amount = parseFloat(edit.children[3].value) || 0;
      const date = edit.children[5].value;
      if (date) totalWeekly += amount / weeksUntil(date);
    });

    const perPay = weeklyToPayCycle(totalWeekly, payFrequency);
    document.getElementById("setAside").textContent = perPay.toFixed(2);
    document.getElementById("remaining").textContent = (income - perPay).toFixed(2);
  }
</script>

</body>
</html>
