<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choffie Finance – Your Simple Budget</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-top: 10px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      margin-top: 15px;
    }

    .item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      background: #fafafa;
    }

    .results {
      background: #eef7ee;
      padding: 15px;
      border-radius: 6px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<h1>Choffie Finance – Your Simple Budget</h1>

<div class="container">

  <!-- INCOME -->
  <div class="section">
    <h2>Income</h2>

    <label>Take-home pay amount</label>
    <input type="number" id="incomeAmount">

    <label>Pay frequency</label>
    <select id="incomeFrequency">
      <option value="weekly">Weekly</option>
      <option value="fortnightly">Fortnightly</option>
      <option value="monthly">Monthly</option>
    </select>
  </div>

  <!-- RECURRING BILLS -->
  <div class="section">
    <h2>Recurring Bills</h2>
    <div id="bills"></div>
    <button type="button" id="addBillBtn">Add Bill</button>
  </div>

  <!-- ONE-OFF EXPENSES -->
  <div class="section">
    <h2>One-off Expenses</h2>
    <div id="oneOffs"></div>
    <button type="button" id="addOneOffBtn">Add One-off Expense</button>
  </div>

  <!-- SAVE -->
  <button type="button" onclick="saveData()">💾 Save Budget</button>

  <!-- RESULTS -->
  <div class="section results">
    <h2>Results (per pay)</h2>
    <p><strong>Total to set aside:</strong> $<span id="setAside">0.00</span></p>
    <p><strong>Money left to spend:</strong> $<span id="remaining">0.00</span></p>
  </div>

</div>

<script>
  const billsDiv = document.getElementById("bills");
  const oneOffsDiv = document.getElementById("oneOffs");

  addBillBtn.addEventListener("click", () => addBill());
  addOneOffBtn.addEventListener("click", () => addOneOff());
  document.addEventListener("input", calculate);

  function addBill(data = {}) {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <label>Bill name</label>
      <input type="text" value="${data.name || ""}">

      <label>Amount</label>
      <input type="number" value="${data.amount || ""}">

      <label>Frequency</label>
      <select>
        <option value="weekly">Weekly</option>
        <option value="fortnightly">Fortnightly</option>
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="yearly">Yearly</option>
      </select>
    `;
    div.querySelector("select").value = data.frequency || "monthly";
    billsDiv.appendChild(div);
  }

  function addOneOff(data = {}) {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <label>Expense name</label>
      <input type="text" value="${data.name || ""}">

      <label>Total amount</label>
      <input type="number" value="${data.amount || ""}">

      <label>Needed by date</label>
      <input type="date" value="${data.date || ""}">
    `;
    oneOffsDiv.appendChild(div);
  }

  function frequencyToWeekly(amount, frequency) {
    return {
      weekly: amount,
      fortnightly: amount / 2,
      monthly: amount * 12 / 52,
      quarterly: amount * 4 / 52,
      yearly: amount / 52
    }[frequency] || 0;
  }

  function weeklyToPayCycle(amount, payFrequency) {
    return {
      weekly: amount,
      fortnightly: amount * 2,
      monthly: amount * 52 / 12
    }[payFrequency] || 0;
  }

  function weeksUntil(date) {
    const now = new Date();
    const target = new Date(date);
    return Math.max((target - now) / (1000 * 60 * 60 * 24 * 7), 1);
  }

  function calculate() {
    const income = +incomeAmount.value || 0;
    const payFrequency = incomeFrequency.value;

    let totalWeekly = 0;

    document.querySelectorAll("#bills .item").forEach(item => {
      totalWeekly += frequencyToWeekly(
        +item.children[3].value || 0,
        item.children[5].value
      );
    });

    document.querySelectorAll("#oneOffs .item").forEach(item => {
      const amount = +item.children[3].value || 0;
      const date = item.children[5].value;
      if (date) totalWeekly += amount / weeksUntil(date);
    });

    const perPay = weeklyToPayCycle(totalWeekly, payFrequency);
    setAside.textContent = perPay.toFixed(2);
    remaining.textContent = (income - perPay).toFixed(2);
  }

  function saveData() {
    const data = {
      incomeAmount: incomeAmount.value,
      incomeFrequency: incomeFrequency.value,
      bills: [...document.querySelectorAll("#bills .item")].map(i => ({
        name: i.children[1].value,
        amount: i.children[3].value,
        frequency: i.children[5].value
      })),
      oneOffs: [...document.querySelectorAll("#oneOffs .item")].map(i => ({
        name: i.children[1].value,
        amount: i.children[3].value,
        date: i.children[5].value
      }))
    };

    localStorage.setItem("choffieBudget", JSON.stringify(data));
    alert("Budget saved ✅");
  }

  function loadData() {
    const data = JSON.parse(localStorage.getItem("choffieBudget"));
    if (!data) return;

    incomeAmount.value = data.incomeAmount;
    incomeFrequency.value = data.incomeFrequency;

    data.bills.forEach(addBill);
    data.oneOffs.forEach(addOneOff);

    calculate();
  }

  loadData();
</script>

</body>
</html>
