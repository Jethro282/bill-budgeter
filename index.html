<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Bill Budgeter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    h1 { text-align: center; }
    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .section { margin-bottom: 30px; }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button { cursor: pointer; margin-top: 15px; }
    .item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
    .results {
      background: #eef7ee;
      padding: 15px;
      border-radius: 6px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<h1>Simple Bill Budgeter</h1>

<div class="container">

  <div class="section">
    <h2>Income</h2>
    <label>Take-home pay amount</label>
    <input type="number" id="incomeAmount">

    <label>Pay frequency</label>
    <select id="incomeFrequency">
      <option value="weekly">Weekly</option>
      <option value="fortnightly">Fortnightly</option>
      <option value="monthly">Monthly</option>
    </select>
  </div>

  <div class="section">
    <h2>Recurring Bills</h2>
    <div id="bills"></div>
    <button onclick="addBill()">Add Bill</button>
  </div>

  <div class="section">
    <h2>One-off Expenses</h2>
    <div id="oneOffs"></div>
    <button onclick="addOneOff()">Add One-off Expense</button>
  </div>

  <div class="section results">
    <h2>Results (per pay)</h2>
    <p><strong>Total to set aside:</strong> $<span id="setAside">0.00</span></p>
    <p><strong>Money left to spend:</strong> $<span id="remaining">0.00</span></p>
  </div>

</div>

  const oneOffsDiv = document.getElementById("oneOffs");

      <input type="text">
      <label>Amount</label>
      <input type="number">
      <label>Frequency</label>
      <select>
        <option value="weekly">Weekly</option>
        <option value="fortnightly">Fortnightly</option>
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="yearly">Yearly</option>
      </select>
    `;
    billsDiv.appendChild(div);
  }

    oneOffsDiv.appendChild(div);
  }
