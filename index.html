<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choffie Finance – Your Simple Budget</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-top: 10px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      margin-top: 15px;
    }

    .item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      background: #fafafa;
    }

    .summary {
      background: #f0f0f0;
      padding: 8px;
      border-radius: 5px;
      margin-top: 5px;
      cursor: pointer;
    }

    .results {
      background: #eef7ee;
      padding: 15px;
      border-radius: 6px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<h1>Choffie Finance – Your Simple Budget</h1>

<div class="container">

  <!-- INCOME -->
  <div class="section">
    <h2>Income</h2>

    <label>Take-home pay amount</label>
    <input type="number" id="incomeAmount">

    <label>Pay frequency</label>
    <select id="incomeFrequency">
      <option value="weekly">Weekly</option>
      <option value="fortnightly">Fortnightly</option>
      <option value="monthly">Monthly</option>
    </select>
  </div>

  <!-- RECURRING BILLS -->
  <div class="section">
    <h2>Recurring Bills</h2>
    <div id="bills"></div>
    <button type="button" id="addBillBtn">Add Bill</button>
  </div>

  <!-- ONE-OFF EXPENSES -->
  <div class="section">
    <h2>One-off Expenses</h2>
    <div id="oneOffs"></div>
    <button type="button" id="addOneOffBtn">Add One-off Expense</button>
  </div>

  <!-- SAVE -->
  <button type="button" onclick="saveData()">💾 Save Budget</button>

  <!-- RESULTS -->
  <div class="section results">
    <h2>Results (per pay)</h2>
    <p><strong>Total to set aside:</strong> $<span id="setAside">0.00</span></p>
    <p><strong>Money left to spend:</strong> $<span id="remaining">0.00</span></p>
  </div>

</div>

<script>
const billsDiv = document.getElementById("bills");
const oneOffsDiv = document.getElementById("oneOffs");

addBillBtn.addEventListener("click", () => addBill());
addOneOffBtn.addEventListener("click", () => addOneOff());
document.addEventListener("input", calculate);

function addBill(data = {}) {
  const div = document.createElement("div");
  div.className = "item";
  div.dataset.collapsed = "false";

  const name = data.name || "";
  const amount = data.amount || "";
  const frequency = data.frequency || "monthly";

  div.innerHTML = `
    <div class="summary" onclick="toggleBill(this)">
      ${name ? `${name} $${amount} ${frequency}` : 'New Bill'}
    </div>
    <div class="details">
      <label>Bill name</label>
      <input type="text" value="${name}" placeholder="Bill name">

      <label>Amount</label>
      <input type="number" value="${amount}" placeholder="Amount">

      <label>Frequency</label>
      <select>
        <option value="weekly">Weekly</option>
        <option value="fortnightly">Fortnightly</option>
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="yearly">Yearly</option>
      </select>
    </div>
  `;

  div.querySelector("select").value = frequency;
  div.querySelectorAll("input, select").forEach(el => el.addEventListener("input", updateSummary));
  billsDiv.appendChild(div);
}

function addOneOff(data = {}) {
  const div = document.createElement("div");
  div.className = "item";
  div.dataset.collapsed = "false";

  const name = data.name || "";
  const amount = data.amount || "";
  const date = data.date || "";

  div.innerHTML = `
    <div class="summary" onclick="toggleBill(this)">
      ${name ? `${name} $${amount} by ${date}` : 'New Expense'}
    </div>
    <div class="details">
      <label>Expense name</label>
      <input type="text" value="${name}" placeholder="Expense name">

      <label>Total amount</label>
      <input type="number" value="${amount}" placeholder="Amount">

      <label>Needed by date</label>
      <input type="date" value="${date}">
    </div>
  `;

  div.querySelectorAll("input, select").forEach(el => el.addEventListener("input", updateSummary));
  oneOffsDiv.appendChild(div);
}

function toggleBill(summaryDiv) {
  const parent = summaryDiv.parentElement;
  const details = parent.querySelector(".details");
  const collapsed = parent.dataset.collapsed === "true";
  details.style.display = collapsed ? "block" : "none";
  parent.dataset.collapsed = (!collapsed).toString();
}

function updateSummary(e) {
  const parent = e.target.closest(".item");
  const summary = parent.querySelector(".summary");
  if (parent.parentElement.id === "bills") {
    const name = parent.querySelector("input[type=text]").value;
    const amount = parent.querySelector("input[type=number]").value;
    const freq = parent.querySelector("select").value;
    summary.textContent = `${name} $${amount} ${freq}`;
  } else if (parent.parentElement.id === "oneOffs") {
    const name = parent.querySelector("input[type=text]").value;
    const amount = parent.querySelector("input[type=number]").value;
    const date = parent.querySelector("input[type=date]").value;
    summary.textContent = `${name} $${amount} by ${date}`;
  }
  calculate();
}

// Budget calculations
function frequencyToWeekly(amount, frequency) {
  return {
    weekly: amount,
    fortnightly: amount / 2,
    monthly: amount * 12 / 52,
    quarterly: amount * 4 / 52,
    yearly: amount / 52
  }[frequency] || 0;
}

function weeklyToPayCycle(amount, payFrequency) {
  return {
    weekly: amount,
    fortnightly: amount * 2,
    monthly: amount * 52 / 12
  }[payFrequency] || 0;
}

function weeksUntil(date) {
  const now = new Date();
  const target = new Date(date);
  return Math.max((target - now) / (1000 * 60 * 60 * 24 * 7), 1);
}

function calculate() {
  const income = +incomeAmount.value || 0;
  const payFrequency = incomeFrequency.value;
  let totalWeekly = 0;

  document.querySelectorAll("#bills .item").forEach(item => {
    const inputs = item.querySelectorAll("input, select");
    const amt = +inputs[1].value || 0;
    const freq = inputs[2].value;
    totalWeekly += frequencyToWeekly(amt, freq);
  });

  document.querySelectorAll("#oneOffs .item").forEach(item => {
    const inputs = item.querySelectorAll("input");
    const amt = +inputs[1].value || 0;
    const date = inputs[2].value;
    if (date) totalWeekly += amt / weeksUntil(date);
  });

  const perPay = weeklyToPayCycle(totalWeekly, payFrequency);
  setAside.textContent = perPay.toFixed(2);
  remaining.textContent = (income - perPay).toFixed(2);
}

// Save/load
function saveData() {
  const data = {
    incomeAmount: incomeAmount.value,
    incomeFrequency: incomeFrequency.value,
    bills: [...document.querySelectorAll("#bills .item")].map(i => ({
      name: i.querySelector("input[type=text]").value,
      amount: i.querySelector("input[type=number]").value,
      frequency: i.querySelector("select").value
    })),
    oneOffs: [...document.querySelectorAll("#oneOffs .item")].map(i => ({
      name: i.querySelector("input[type=text]").value,
      amount: i.querySelector("input[type=number]").value,
      date: i.querySelector("input[type=date]").value
    }))
  };
  localStorage.setItem("choffieBudget", JSON.stringify(data));
  alert("Budget saved ✅");
}

function loadData() {
  const data = JSON.parse(localStorage.getItem("choffieBudget"));
  if (!data) return;
  incomeAmount.value = data.incomeAmount;
  incomeFrequency.value = data.incomeFrequency;
  data.bills.forEach(addBill);
  data.oneOffs.forEach(addOneOff);
  calculate();
}

loadData();
</script>

</body>
</html>
