<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choffie Finance – Your Simple Budget</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-top: 10px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #ffffff;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.section {
  margin-bottom: 30px;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, select, button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  box-sizing: border-box;
}

button {
  cursor: pointer;
  margin-top: 10px;
}

.item {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  background: #fafafa;
  position: relative;
}

.deleteBtn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: #ff4d4d;
  color: white;
  border: none;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.9em;
}

.summary {
  font-weight: bold;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.summary-left {
  flex: 1;
}

.summary-right {
  margin-left: 20px;
  white-space: nowrap;
}

.results {
  background: #eef7ee;
  padding: 15px;
  border-radius: 6px;
  font-size: 1.1em;
}
</style>
</head>
<body>

<h1>Choffie Finance – Your Simple Budget</h1>

<div class="container">

  <!-- INCOME -->
  <div class="section">
    <h2>Income Sources</h2>
    <div id="incomes"></div>
    <button type="button" id="addIncomeBtn">Add Income</button>
  </div>

  <!-- RECURRING BILLS -->
  <div class="section">
    <h2>Recurring Bills</h2>
    <div id="bills"></div>
    <button type="button" id="addBillBtn">Add Bill</button>
  </div>

  <!-- ONE-OFF EXPENSES -->
  <div class="section">
    <h2>One-off Expenses</h2>
    <div id="oneOffs"></div>
    <button type="button" id="addOneOffBtn">Add One-off Expense</button>
  </div>

  <!-- SAVE -->
  <button type="button" onclick="saveData()">💾 Save Budget</button>

  <!-- RESULTS -->
  <div class="section results">
    <h2>Results (per pay)</h2>
    <p><strong>Total to set aside:</strong> $<span id="setAside">0.00</span></p>
    <p><strong>Money left to spend:</strong> $<span id="remaining">0.00</span></p>
  </div>

</div>

<script>
const billsDiv = document.getElementById("bills");
const oneOffsDiv = document.getElementById("oneOffs");
const incomesDiv = document.getElementById("incomes");
const addBillBtn = document.getElementById("addBillBtn");
const addOneOffBtn = document.getElementById("addOneOffBtn");
const addIncomeBtn = document.getElementById("addIncomeBtn");
const setAside = document.getElementById("setAside");
const remaining = document.getElementById("remaining");

addBillBtn.addEventListener("click", () => addBill());
addOneOffBtn.addEventListener("click", () => addOneOff());
addIncomeBtn.addEventListener("click", () => addIncome());
document.addEventListener("input", calculate);

// ----- BILLS -----
function addBill(data={}) {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <button class="deleteBtn" type="button">X</button>
    <div class="summary">
      <div class="summary-left">${data.name || "New Bill"} $${data.amount || 0} ${data.frequency || 'monthly'}</div>
      <div class="summary-right">Amount to Set Aside: $0.00</div>
    </div>
    <div class="details">
      <label>Bill name</label>
      <input type="text" value="${data.name || ''}">
      <label>Amount</label>
      <input type="number" value="${data.amount || ''}">
      <label>Frequency</label>
      <select>
        <option value="weekly">Weekly</option>
        <option value="fortnightly">Fortnightly</option>
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="yearly">Yearly</option>
      </select>
    </div>
  `;

  const summaryDiv = div.querySelector(".summary");
  const detailsDiv = div.querySelector(".details");
  div.querySelector("select").value = data.frequency || "monthly";

  summaryDiv.addEventListener("click", () => {
    detailsDiv.style.display = detailsDiv.style.display === "none" ? "block" : "none";
    updateSummary(div);
  });

  div.querySelector(".deleteBtn").addEventListener("click", () => {
    div.remove();
    calculate();
  });

  div.querySelectorAll("input, select").forEach(el => el.addEventListener("input", () => updateSummary(div)));

  billsDiv.appendChild(div);
  detailsDiv.style.display = "block";
}

// ----- ONE-OFF EXPENSES -----
function addOneOff(data={}) {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <button class="deleteBtn" type="button">X</button>
    <div class="summary">
      <div class="summary-left">${data.name || "New Expense"} $${data.amount || 0}${data.date ? " by " + data.date : ""}</div>
      <div class="summary-right">Amount to Set Aside: $0.00</div>
    </div>
    <div class="details">
      <label>Expense name</label>
      <input type="text" value="${data.name || ''}">
      <label>Total amount</label>
      <input type="number" value="${data.amount || ''}">
      <label>Needed by date</label>
      <input type="date" value="${data.date || ''}">
    </div>
  `;

  const summaryDiv = div.querySelector(".summary");
  const detailsDiv = div.querySelector(".details");

  summaryDiv.addEventListener("click", () => {
    detailsDiv.style.display = detailsDiv.style.display === "none" ? "block" : "none";
    updateSummary(div);
  });

  div.querySelector(".deleteBtn").addEventListener("click", () => {
    div.remove();
    calculate();
  });

  div.querySelectorAll("input, select").forEach(el => el.addEventListener("input", () => updateSummary(div)));

  oneOffsDiv.appendChild(div);
  detailsDiv.style.display = "block";
}

// ----- INCOME SOURCES -----
function addIncome(data={}) {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <button class="deleteBtn" type="button">X</button>
    <div class="summary">
      <div class="summary-left">${data.name || "New Income"} $${data.amount || 0} ${data.frequency || 'monthly'}</div>
      <div class="summary-right"></div>
    </div>
    <div class="details">
      <label>Income name</label>
      <input type="text" value="${data.name || ''}">
      <label>Amount</label>
      <input type="number" value="${data.amount || ''}">
      <label>Frequency</label>
      <select>
        <option value="weekly">Weekly</option>
        <option value="fortnightly">Fortnightly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
  `;

  const summaryDiv = div.querySelector(".summary");
  const detailsDiv = div.querySelector(".details");
  div.querySelector("select").value = data.frequency || "monthly";

  summaryDiv.addEventListener("click", () => {
    detailsDiv.style.display = detailsDiv.style.display === "none" ? "block" : "none";
    updateSummary(div);
  });

  div.querySelector(".deleteBtn").addEventListener("click", () => {
    div.remove();
    calculate();
  });

  div.querySelectorAll("input, select").forEach(el => el.addEventListener("input", () => updateSummary(div)));

  incomesDiv.appendChild(div);
  detailsDiv.style.display = "block";
}

// ----- UPDATE SUMMARY -----
function updateSummary(div) {
  const summaryLeft = div.querySelector(".summary-left");
  const summaryRight = div.querySelector(".summary-right");
  const detailsDiv = div.querySelector(".details");
  const inputs = detailsDiv.querySelectorAll("input, select");
  let weeklyAmount = 0;

  if (div.parentElement.id === "bills") {
    const name = inputs[0].value || "New Bill";
    const amount = +inputs[1].value || 0;
    const freq = inputs[2].value || "monthly";
    weeklyAmount = frequencyToWeekly(amount, freq);
    summaryLeft.textContent = `${name} $${amount} ${freq}`;
    summaryRight.textContent = `Amount to Set Aside: $${weeklyAmount.toFixed(2)}`;
  } else if (div.parentElement.id === "oneOffs") {
    const name = inputs[0].value || "New Expense";
    const amount = +inputs[1].value || 0;
    const date = inputs[2].value;
    const weeks = date ? weeksUntil(date) : 1;
    weeklyAmount = amount / weeks;
    summaryLeft.textContent = `${name} $${amount}${date ? " by " + date : ""}`;
    summaryRight.textContent = `Amount to Set Aside: $${weeklyAmount.toFixed(2)}`;
  } else {
    const name = inputs[0].value || "New Income";
    const amount = +inputs[1].value || 0;
    const freq = inputs[2].value || "monthly";
    summaryLeft.textContent = `${name} $${amount} ${freq}`;
    summaryRight.textContent = "";
  }

  calculate();
}

// ----- BUDGET CALCULATIONS -----
function frequencyToWeekly(amount, frequency) {
  return {
    weekly: amount,
    fortnightly: amount / 2,
    monthly: amount * 12 / 52,
    quarterly: amount * 4 / 52,
    yearly: amount / 52
  }[frequency] || 0;
}

function weeklyToPayCycle(amount, payFrequency) {
  return {
    weekly: amount,
    fortnightly: amount * 2,
    monthly: amount * 52 / 12
  }[payFrequency] || 0;
}

function weeksUntil(date) {
  const now = new Date();
  const target = new Date(date);
  return Math.max((target - now) / (1000 * 60 * 60 * 24 * 7), 1);
}

function calculate() {
  let totalWeekly = 0;
  let incomeTotal = 0;

  document.querySelectorAll("#incomes .item").forEach(item => {
    const inputs = item.querySelectorAll("input, select");
    const amt = +inputs[1].value || 0;
    const freq = inputs[2].value;
    incomeTotal += weeklyToPayCycle(frequencyToWeekly(amt, freq), freq);
  });

  document.querySelectorAll("#bills .item").forEach(item => {
    const inputs = item.querySelectorAll("input, select");
    const amt = +inputs[1].value || 0;
    const freq = inputs[2].value;
    totalWeekly += frequencyToWeekly(amt, freq);
  });

  document.querySelectorAll("#oneOffs .item").forEach(item => {
    const inputs = item.querySelectorAll("input");
    const amt = +inputs[1].value || 0;
    const date = inputs[2].value;
    if (date) totalWeekly += amt / weeksUntil(date);
  });

  const payFrequency = document.querySelector("#incomes .item select") ? document.querySelector("#incomes .item select").value : "weekly";
  const perPay = weeklyToPayCycle(totalWeekly, payFrequency);
  setAside.textContent = perPay.toFixed(2);
  remaining.textContent = (incomeTotal - perPay).toFixed(2);
}

// ----- SAVE / LOAD -----
function saveData() {
  const data = {
    incomes: [...document.querySelectorAll("#incomes .item")].map(i => ({
      name: i.querySelector("input[type=text]").value,
      amount: i.querySelector("input[type=number]").value,
      frequency: i.querySelector("select").value
    })),
    bills: [...document.querySelectorAll("#bills .item")].map(i => ({
      name: i.querySelector("input[type=text]").value,
      amount: i.querySelector("input[type=number]").value,
      frequency: i.querySelector("select").value
    })),
    oneOffs: [...document.querySelectorAll("#oneOffs .item")].map(i => ({
      name: i.querySelector("input[type=text]").value,
      amount: i.querySelector("input[type=number]").value,
      date: i.querySelector("input[type=date]").value
    }))
  };
  localStorage.setItem("choffieBudget", JSON.stringify(data));
  alert("Budget saved ✅");
}

function loadData() {
  const data = JSON.parse(localStorage.getItem("choffieBudget"));
  if (!data) return;
  data.incomes.forEach(addIncome);
  data.bills.forEach(addBill);
  data.oneOffs.forEach(addOneOff);
  calculate();
}

loadData();
</script>

</body>
</html>
